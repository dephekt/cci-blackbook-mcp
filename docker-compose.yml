# Base service definition.
#
#   docker compose up -d --build
#       -> also loads docker-compose.override.yml (local: publishes 127.0.0.1:8000
#          and mounts ./data), so it "just works" on your machine.
#
#   docker compose -f docker-compose.yml -f deploy/pangolin.yml up -d --build
#       -> reverse-proxy deployment (no published host port; proxy fronts :8000).
name: cci-blackbook

services:
  cci-blackbook:
    build:
      context: .
    image: cci-blackbook-mcp:local
    container_name: cci-blackbook
    restart: unless-stopped
    env_file:
      # Copy secrets/cci.env.example -> secrets/cci.env. Optional so the stack can
      # start from the defaults below (e.g. stub backend) before you create it.
      - path: ./secrets/cci.env
        required: false
    environment:
      CCI_SOURCE_PDF: /data/source/document.pdf
      CCI_INDEX_DIR: /data/index
      CCI_CACHE_DIR: /data/cache
      # Voyage embeddings (requires VOYAGE_API_KEY). "stub" exists only so the
      # offline test suite can run without a key; it is not a useful backend.
      CCI_EMBEDDING_BACKEND: ${CCI_EMBEDDING_BACKEND:-voyage}
      CCI_VOYAGE_TEXT_MODEL: voyage-context-4
      CCI_VOYAGE_IMAGE_MODEL: voyage-multimodal-3.5
      CCI_VOYAGE_OUTPUT_DIM: "1024"
      CCI_RENDER_DPI: "100"
      CCI_DOC_TOKEN_BUDGET: "28000"
      CCI_MM_TOKEN_BUDGET: "200000"
      CCI_MIN_VECTOR_SCORE: "0.20"
      CCI_MIN_IMAGE_SCORE: "0.0"
      CCI_RRF_WEIGHT_IMAGE: "2.0"
      CCI_MAX_UNITS_PER_PAGE: "2"
      CCI_BLANK_MIN_CHARS: "100"
      CCI_BLANK_MAX_INK: "0.02"
      CCI_BLANK_MAX_COLOR: "0.005"
      CCI_MCP_HOST: 0.0.0.0
      CCI_MCP_PORT: "8000"
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
